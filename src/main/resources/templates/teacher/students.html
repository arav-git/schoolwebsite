<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher - Students by Class</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="site-body">
<header class="topbar">
    <div class="wrap topbar-inner">
        <a class="brand" th:href="@{/portal}">
            <span class="brand-mark">SW</span>
            <span class="brand-text">Teacher Portal</span>
        </a>
        <div class="menu">
            <a th:href="@{/teacher/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-small">Logout</button>
            </form>
        </div>
    </div>
</header>

<main class="section">
    <div class="wrap">
        <div class="section-head">
            <h2>Students By Class</h2>
            <p>Teachers can view class roster only. Fee/salary data is hidden.</p>
        </div>

        <form method="get" th:action="@{/teacher/students}" class="auth-form" style="max-width: 320px; margin-bottom: 20px;">
            <label for="schoolClass">Select Class</label>
            <select id="schoolClass" name="schoolClass">
                <option th:each="schoolClass : ${classes}"
                        th:value="${schoolClass}"
                        th:text="${schoolClass}"
                        th:selected="${schoolClass == selectedClass}">
                </option>
            </select>
            <button class="btn" type="submit">View Students</button>
        </form>

        <section class="table-section">
            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Joining Date</th>
                        <th>Class</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="5">No students found for selected class.</td>
                    </tr>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.userId}">1</td>
                        <td th:text="${student.fullName}">Name</td>
                        <td th:text="${student.email}">email</td>
                        <td th:text="${student.joiningDate}">2026-01-01</td>
                        <td th:text="${student.schoolClass}">CLASS_1</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
