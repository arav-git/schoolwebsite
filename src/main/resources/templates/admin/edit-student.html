<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<main class="auth-layout">
    <section class="auth-promo">
        <p class="eyebrow">Admin Controls</p>
        <h1>Edit Student Details</h1>
        <p>Update student information, class, and fee values directly in the database.</p>
        <a class="btn btn-light" th:href="@{/admin/dashboard}">Back to Dashboard</a>
    </section>

    <section class="auth-panel">
        <h2 th:text="'Student ID: ' + ${userId}">Student</h2>

        <form th:action="@{/admin/students/{id}/edit(id=${userId})}" th:object="${form}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" th:field="*{fullName}">
            <p class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>

            <label for="joiningDate">Joining Date</label>
            <input id="joiningDate" type="date" th:field="*{joiningDate}">
            <p class="error" th:if="${#fields.hasErrors('joiningDate')}" th:errors="*{joiningDate}"></p>

            <label for="schoolClass">Class</label>
            <select id="schoolClass" th:field="*{schoolClass}">
                <option th:each="schoolClass : ${classes}" th:value="${schoolClass}" th:text="${schoolClass}"></option>
            </select>
            <p class="error" th:if="${#fields.hasErrors('schoolClass')}" th:errors="*{schoolClass}"></p>

            <label for="feePerMonth">Fee Per Month</label>
            <input id="feePerMonth" type="number" step="0.01" min="0" th:field="*{feePerMonth}" readonly>

            <label for="feeRemaining">Fee Remaining</label>
            <input id="feeRemaining" type="number" step="0.01" min="0" th:field="*{feeRemaining}" readonly>

            <label for="busFeePerMonth">Bus Fee Per Month</label>
            <input id="busFeePerMonth" type="number" step="0.01" min="0" th:field="*{busFeePerMonth}" readonly>

            <label for="busFeeYearly">Bus Fee Yearly</label>
            <input id="busFeeYearly" type="number" step="0.01" min="0" th:field="*{busFeeYearly}" readonly>

            <button type="submit" class="btn">Save Student</button>
        </form>
    </section>
</main>
<script th:inline="javascript">
    const classFeeMap = /*[[${classFeeMap}]]*/ {};
    const schoolClassEl = document.getElementById('schoolClass');
    const feePerMonthEl = document.getElementById('feePerMonth');
    const feeRemainingEl = document.getElementById('feeRemaining');
    const busFeePerMonthEl = document.getElementById('busFeePerMonth');
    const busFeeYearlyEl = document.getElementById('busFeeYearly');

    function formatMoney(value) {
        const numeric = Number(value || 0);
        return Number.isFinite(numeric) ? numeric.toFixed(2) : '0.00';
    }

    function applyClassFees() {
        const selectedClass = schoolClassEl.value;
        const fees = classFeeMap[selectedClass];
        if (!fees) {
            return;
        }
        const feePerMonth = Number(fees.feePerMonth || 0);
        const busFeePerMonth = Number(fees.busFeePerMonth || 0);
        const busFeeYearly = Number(fees.busFeeYearly || 0);
        feePerMonthEl.value = formatMoney(feePerMonth);
        busFeePerMonthEl.value = formatMoney(busFeePerMonth);
        busFeeYearlyEl.value = formatMoney(busFeeYearly);
        feeRemainingEl.value = formatMoney(feePerMonth + busFeePerMonth);
    }

    schoolClassEl.addEventListener('change', applyClassFees);
    applyClassFees();
</script>
</body>
</html>
