spring.application.name=schoolwebsite

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:schooluser}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false
spring.jpa.open-in-view=false
server.port=8080

# Initial admin account (change in local environment)
app.admin.email=${APP_ADMIN_EMAIL:admin@school.local}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.name=${APP_ADMIN_NAME:System Admin}
app.promotion.auto.enabled=${APP_PROMOTION_AUTO_ENABLED:true}
app.promotion.auto.day-month=${APP_PROMOTION_AUTO_DAY_MONTH:04-01}
app.promotion.auto.cron=${APP_PROMOTION_AUTO_CRON:0 30 2 * * *}
